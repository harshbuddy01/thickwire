name: Vercel Deploy Alert

on:
  push:
    branches: [ "main" ]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Vercel deploy
        run: sleep 60

      - name: Check site is live
        id: health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://streamkart.store)
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          if [ "$STATUS" -eq 200 ]; then
            echo "result=success" >> $GITHUB_OUTPUT
          else
            echo "result=failure" >> $GITHUB_OUTPUT
          fi

      - name: ✅ Notify Telegram on Success
        if: steps.health.outputs.result == 'success'
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="✅ <b>StreamKart Storefront Deploy Success</b>%0A%0A📦 Commit: ${{ github.event.head_commit.message }}%0A👤 By: ${{ github.actor }}%0A🌐 Site: https://streamkart.store"

      - name: ❌ Notify Telegram on Failure
        if: steps.health.outputs.result == 'failure'
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="⚠️ <b>StreamKart Storefront may be DOWN!</b>%0A%0A📦 Commit: ${{ github.event.head_commit.message }}%0A🔢 HTTP Status: ${{ steps.health.outputs.status }}%0A🔗 <a href='https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'>View Logs</a>"
